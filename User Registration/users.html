<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Users</title>

    <link rel="stylesheet" href="users.css">
</head>
<body>

    <div class="background-animation"></div>

    <div class="container glass-panel">
        <div class="page-header">
            <h2>Registered Users</h2>
            <p>Community members showcase</p>
        </div>

        <div class="table-container">
            <table class="user-table">
                <thead>
                    <tr>
                        <th>
                            <div class="th-content">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                Name
                            </div>
                        </th>
                        <th>
                            <div class="th-content">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                                Email Address
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
        </div>

        <div class="actions">
            <a href="index.html" class="btn-secondary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Registration
            </a>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem("users")) || [];
        let table = document.getElementById("userTableBody");

        if (users.length === 0) {
            table.innerHTML = `
                <tr>
                    <td colspan='2'>
                        <div class="empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path><line x1="15" y1="15" x2="23" y2="23" stroke-width="2"></line></svg>
                            <p>No users registered yet.</p>
                            <span>Be the first one to join!</span>
                        </div>
                    </td>
                </tr>`;
        } else {
            users.forEach((user, index) => {
                let row = `
                    <tr style="animation-delay: ${index * 0.1}s">
                        <td><div class="td-content">${user.name}</div></td>
                        <td><div class="td-content email-text">${user.email}</div></td>
                    </tr>
                `;
                table.innerHTML += row;
            });
        }
    </script>

</body>
</html>
