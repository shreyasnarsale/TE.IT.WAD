<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us - Premium Registration</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-animation"></div>

    <div class="container">
        <div class="form-wrapper glass-panel">
            <div class="form-header">
                <h2>Create Account</h2>
                <p>Join our exclusive community today</p>
            </div>

            <form id="registrationForm">
                <div class="input-group">
                    <input type="text" id="name" required placeholder=" ">
                    <label for="name">Full Name</label>
                </div>

                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Email Address</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                </div>
                <small id="passError" class="error-text"></small>

                <button type="submit" class="glow-btn" id="submitBtn">
                    <span>Register Now</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>

            <div class="form-footer">
                <p>Already registered?</p>
                <a href="users.html" class="text-link">View User List</a>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast" class="toast hidden">
        <div class="toast-content">
            <svg class="success-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <span id="toastMessage">Registered Successfully!</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
