<nav class="navbar">
  <div class="container navbar-container">
    <a routerLink="/" class="logo">Nexus</a>
    
    <div class="nav-links">
      @if (auth.currentUser()) {
        <a routerLink="/profile" routerLinkActive="active" class="nav-link">Profile</a>
        <button (click)="logout()" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active" class="nav-link">Login</a>
        <a routerLink="/register" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem; width: auto;">Register</a>
      }
    </div>
  </div>
</nav>

<main>
  <router-outlet></router-outlet>
</main>
