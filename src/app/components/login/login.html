<div class="auth-container animate-fade-in">
  <div class="card">
    <h2 class="card-title">Welcome Back</h2>
    <p class="card-subtitle">Sign in to your Nexus account to continue.</p>
    
    @if (error()) {
      <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: var(--error); padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1.5rem; font-size: 0.875rem;">
        {{ error() }}
      </div>
    }

    <form (submit)="onSubmit(); $event.preventDefault()">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          id="email" 
          type="email" 
          class="form-input" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="you@example.com"
          required
        />
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          id="password" 
          type="password" 
          class="form-input" 
          [(ngModel)]="password" 
          name="password" 
          placeholder="••••••••"
          required
        />
      </div>
      
      <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
        Sign In
      </button>
    </form>
    
    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem; color: var(--text-muted);">
      Don't have an account? <a routerLink="/register" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">Register here</a>
    </div>
  </div>
</div>
